spring.application.name=connect-hub-be
server.servlet.context-path=/api

# 2. DATABASE CONNECTION CONFIGURATION
spring.datasource.url=jdbc:postgresql://localhost:5432/connecthub?TimeZone=UTC
spring.datasource.username=sa
spring.datasource.password=sapassword
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# 3. JPA / HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=OFF
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.orm.jdbc.bind=TRACE

jwt.secret-key=Cx9ggqacItcQkLZpMlInM9R6XMZeUxtj2fiTPQC6cPDO6LZwF7x8uJJAfekWQg07SnpMb6fWMk0PSwjBtNzgwA==
# seconds
jwt.expiration=3600000
# seconds
jwt.refreshable-duration=7200000

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}

logging.level.org.springframework.security=DEBUG