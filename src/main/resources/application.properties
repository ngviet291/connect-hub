spring.application.name=connect-hub-be
server.servlet.context-path=/api

# 2. DATABASE CONNECTION CONFIGURATION
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?TimeZone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# 3. JPA / HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=OFF
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.orm.jdbc.bind=TRACE

jwt.secret-key=${JWT_SECRET}
# seconds
jwt.expiration=${JWT_EXPIRATION}
# seconds
jwt.refreshable-duration=${JWT_REFRESH_EXPIRATION}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.password=${REDIS_PASSWORD}
logging.level.org.springframework.security=DEBUG

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=10MB
app.chat.media.max-size-bytes=26214400


app.chat.group.max-members=100
management.endpoints.web.exposure.include=health

